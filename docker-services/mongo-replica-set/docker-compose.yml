version: '3.8'

services:
  mongo1:
    image: mongo:latest
    container_name: mongo1
    hostname: mongo1
    ports:
      - "27017:27017"
    volumes:
      - mongo-data-1:/data/db
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]

  mongo2:
    image: mongo:latest
    container_name: mongo2
    hostname: mongo2
    ports:
      - "27018:27018" # External 27018 maps to Internal 27018
    volumes:
      - mongo-data-2:/data/db
    # We explicitly change the internal port to 27018 to match external
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27018"]

  mongo3:
    image: mongo:latest
    container_name: mongo3
    hostname: mongo3
    ports:
      - "27019:27019" # External 27019 maps to Internal 27019
    volumes:
      - mongo-data-3:/data/db
    # We explicitly change the internal port to 27019 to match external
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27019"]

  mongo-init:
    image: mongo:latest
    container_name: mongo-init
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    entrypoint: |
      bash -c "
        echo '--- Waiting for mongo1 ---'
        until mongosh --host mongo1 --port 27017 --eval 'db.adminCommand(\"ping\")' &> /dev/null; do sleep 2; done;
      
        echo '--- Waiting for mongo2 ---'
        until mongosh --host mongo2 --port 27018 --eval 'db.adminCommand(\"ping\")' &> /dev/null; do sleep 2; done;
      
        echo '--- Waiting for mongo3 ---'
        until mongosh --host mongo3 --port 27019 --eval 'db.adminCommand(\"ping\")' &> /dev/null; do sleep 2; done;

        echo '--- Initiating Replica Set ---'
        # We check if it's already initiated to avoid errors on restart
        mongosh --host mongo1 --port 27017 --eval 'rs.status()' &> /dev/null
        if [ \$? -eq 0 ]; then
          echo 'Replica set already initiated.'
        else
          mongosh --host mongo1 --port 27017 --eval '
            rs.initiate({
              _id: \"rs0\",
              members: [
                { _id: 0, host: \"mongo1:27017\" },
                { _id: 1, host: \"mongo2:27018\" },
                { _id: 2, host: \"mongo3:27019\" }
              ]
            })
          '
        fi
      "

volumes:
  mongo-data-1:
  mongo-data-2:
  mongo-data-3: